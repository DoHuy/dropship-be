syntax = "proto3";

package dropshipbe;
option go_package="./dropshipbe";

message Request {
  string ping = 1;
}

message Response {
  string pong = 1;
}

// ==========================================
// THÔNG ĐIỆP DỮ LIỆU (MESSAGES)
// ==========================================

message EmptyRequest {
  string country_code = 1; // default parse country code to request
}

message Category {
  int32 id = 1;
  optional int32 parent_id = 2; // Dùng optional vì có thể là null
  string country_code = 3;
  string name = 4;
  string slug = 5;
  string description = 6;
  string image_url = 7;
  bool is_active = 8;
  string alt = 9;
  string button_text = 10;
}

message Gallery {
  int32 id = 1;
  int32 product_id = 2;
  string image_url = 3;
  string video_url = 4;
  string alt_text = 5;
  int32 position = 6;
}

message OptionValue {
  int32 id = 1;
  int32 option_id = 2;
  string value = 3;
  string color_code = 4;
}

message Option {
  int32 id = 1;
  int32 product_id = 2;
  string name = 3;
  string code = 4;
  int32 position = 5;
  repeated OptionValue option_values = 6; // Một Option có nhiều OptionValue
}

message VariantOption {
  int32 option_id = 1;
  string option_code = 2;
  int32 option_value_id = 3;
  string option_value = 4;
}

message Variant {
  int32 id = 1;
  int32 product_id = 2;
  string sku = 3;
  string barcode = 4;
  float price = 5;
  float compare_at_price = 6;
  float cost_price = 7;
  int32 stock_quantity = 8;
  optional int32 weight_gram = 9;
  int32 image_id = 10;
  repeated VariantOption options = 11;
  bool is_active = 12;
  string created_at = 13;
}

// 7. Bậc giá (Price Tier)
message PriceTier {
  int32 id = 1;
  int32 product_id = 2;
  string name = 3;
  int32 qty = 4;
  string savings = 5;
  float discount = 6;
  float price = 7;
  optional string tag = 8;
  string tag_class = 9;
  string created_at = 10;
  int32 position = 11;
}

message Product {
  int32 id = 1;
  string country_code = 2;
  string name = 3;
  string slug = 4;
  string wow_delay = 5;
  map<string, string> metadata = 6;
  repeated Category categories = 7;
  repeated Gallery galleries = 8;
  repeated Gallery description_images = 9;
  repeated Option options = 10;
  repeated Variant variants = 11;
  repeated PriceTier product_price_tiers = 12;
  string description = 13;
  string status = 14;
  bool is_featured = 15;
  bool is_trending = 16;
  bool is_new = 17;
  bool is_on_sale = 18;
  string meta_title = 19;
  string meta_description = 20;
  string vendor = 21;
  string product_type = 22;
  string badge = 23;
  string sale_label = 24;
  string sale_tag = 25;
  bool is_out_of_sale = 26;
  int32 sold = 27;
  float rating = 28;
  int32 review_count = 29;
  bool in_stock = 30;
  string flash_sale_end_time = 31;
  repeated string tags = 32;
  bool quantity_enabled = 33;
  bool quick_shop = 34;
  float price = 35; // Giá sản phẩm cấp cao nhất
  string created_at = 36;
  string updated_at = 37;
}

// 9. Đánh giá (Review)
message ReviewItem {
  int32 id = 1;
  string name = 2;
  string date = 3;
  string avatar = 4;
  int32 rating = 5;
  bool verified = 6;
  string comment = 7;
  repeated string images = 8;
  repeated string videos = 9;
}

message ReviewSummary {
  repeated ReviewItem reviews = 1;
  int32 rating_count = 2;
  float rating_average = 3;
  map<string, int32> rating = 4; // Lưu trữ đếm số lượng sao (vd: "5": 5, "4": 4)
}

// 10. Câu hỏi thường gặp (FAQ)
message Faq {
  int32 id = 1;
  string question = 2;
  string answer = 3;
}

// 11. Trình chiếu ảnh (Slider)
message Slider {
  string img_src = 1;
  string title = 2;
  string sub_text = 3;
}

// 12. Biểu ngữ (Banner)
message Banner {
  int32 id = 1;
  string image_url = 2;
  string alt = 3;
  string title = 4;
  string description = 5;
  optional string video_url = 6;
  optional string video_type = 7;
}

// 13. Bài viết Blog (Blog Item)
message Blog {
  int32 id = 1;
  string slug = 2;
  string category = 3;
  string image_url = 4;
  string alt = 5;
  string title = 6;
  string content = 7; // Đã thêm trường nội dung bài viết
}

// ==========================================
// REQUESTS & RESPONSES (YÊU CẦU & PHẢN HỒI)
// ==========================================

message ProductListResponse {
  repeated Product products = 1;
}

message GetProductBySlugRequest {
  string slug = 1;
  string country_code = 2;
}

message GetProductsByCategoryRequest {
  string category = 1; // Thường dùng slug hoặc ID của category
  string country_code = 2;
}

message ShopSearchParams {
  bool is_featured = 1;
  bool is_trending = 2;
  bool is_new = 3;
  bool is_on_sale = 4;
  string country_code = 5;
}

message GalleryListResponse {
  repeated Gallery galleries = 1;
}

message FaqListResponse {
  repeated Faq faqs = 1;
}

message SliderListResponse {
  repeated Slider sliders = 1;
}

message CategoryListResponse {
  repeated Category categories = 1;
}

message BannerListResponse {
  repeated Banner banners = 1;
}

message BlogListResponse {
  repeated Blog blogs = 1;
}

message GetBlogBySlugRequest {
  string slug = 1;
  string country_code = 2;
}

message BlogDetailResponse {
  Blog blog = 1;
}

message GetRelatedProductsRequest{
    int32 id = 1;
    string country_code = 2;
}

message GetProductReviewsRequest{
    int32 id = 1;
    string country_code = 2;
}

message GetSocialProductVideoRequest{
    int32 id = 1;
    string country_code = 2;
}

message GetProductFaqsRequest {
    int32 id = 1;
    string country_code = 2;
}

// --- CÁC REQUEST TẠO MỚI DỮ LIỆU ---

message CreateProductRequest {
  Product product = 1;
}

// --- CẬP NHẬT: TẢI LÊN NHIỀU FILE ---
message FileData {
  string filename = 1;
  bytes content = 2;
}

message UploadFileRequest {
  repeated FileData files = 1; // Sử dụng mảng để chứa nhiều file
}

message UploadFileResponse {
  repeated string urls = 1; // Trả về danh sách các đường dẫn đã upload thành công
}
// -------------------------------------

message DeleteFileRequest {
  string file_url = 1;
}

message DeleteFileResponse {
  bool success = 1;
}

message CreateProductFaqRequest {
  int32 product_id = 1;
  string question = 2;
  string answer = 3;
}

message CreateProductReviewRequest {
  int32 product_id = 1;
  string name = 2;
  int32 rating = 3;
  string comment = 4;
  repeated string images = 5;
  repeated string videos = 6;
}

message CreateNewBlogRequest {
  string title = 1;
  string content = 2;
  string category = 3;
  string image_url = 4;
  string slug = 5;
  string alt = 6;
  string country_code = 7;
}

message CreateOptionRequest {
  int32 product_id = 1;
  string name = 2;
  string code = 3;
  int32 position = 4;
}

message CreateOptionValueRequest {
  int32 option_id = 1;
  string value = 2;
  string color_code = 3;
}

// --- XÁC THỰC (AUTHENTICATION) ---

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1; // Mã thông báo (JWT) để dùng cho các request sau
  int64 access_expire = 2; // Thời gian hết hạn của token (tính bằng Unix timestamp)
}

// ==========================================
// DỊCH VỤ (SERVICE) THUẦN TÚY
// (Routing đã được chuyển sang gateway.yaml)
// ==========================================

service Dropshipbe {
  
  // --- Products ---
  rpc GetProducts (EmptyRequest) returns (ProductListResponse);
  rpc GetProductBySlug (GetProductBySlugRequest) returns (Product);
  rpc GetProductsByCategory (GetProductsByCategoryRequest) returns (ProductListResponse);
  rpc GetRelatedProducts (GetRelatedProductsRequest) returns (ProductListResponse);
  rpc GetFeaturedProducts (EmptyRequest) returns (ProductListResponse);
  rpc GetNewProducts (EmptyRequest) returns (ProductListResponse);
  rpc CreateProduct (CreateProductRequest) returns (Product);

  // --- Shop Search ---
  rpc GetShop (ShopSearchParams) returns (ProductListResponse);

  // --- Media/Galleries ---
  rpc GetSocialProductVideos (GetSocialProductVideoRequest) returns (GalleryListResponse);

  // --- FAQs ---
  rpc GetProductFaqs (GetProductFaqsRequest) returns (FaqListResponse);
  rpc CreateProductFaq (CreateProductFaqRequest) returns (Faq);

  // --- Reviews ---
  rpc GetProductReviews (GetProductReviewsRequest) returns (ReviewSummary);
  rpc CreateProductReview (CreateProductReviewRequest) returns (ReviewItem);

  // --- UI Items (Sliders, Categories, Banners) ---
  rpc GetSliderItems (EmptyRequest) returns (SliderListResponse);
  rpc GetCategoryItems (EmptyRequest) returns (CategoryListResponse);
  rpc GetBannerItems (EmptyRequest) returns (BannerListResponse);
  rpc GetVideoBanner (EmptyRequest) returns (Banner);

  // --- Blogs ---
  rpc GetBlogItems (EmptyRequest) returns (BlogListResponse);
  rpc GetBlogBySlug (GetBlogBySlugRequest) returns (BlogDetailResponse);
  rpc CreateNewBlog (CreateNewBlogRequest) returns (Blog);

  // --- Options ---
  rpc CreateOption (CreateOptionRequest) returns (Option);
  rpc CreateOptionValue (CreateOptionValueRequest) returns (OptionValue);

  // --- Authentication ---
  rpc Login (LoginRequest) returns (LoginResponse);
  
  // --- Files ---
  rpc UploadFile (UploadFileRequest) returns (UploadFileResponse);
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);

  rpc Ping(Request) returns(Response);
}