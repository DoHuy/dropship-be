Name: dropship-gateway
Host: 0.0.0.0
Port: 8888

Upstreams:
  - Grpc:
      Target: 127.0.0.1:8080
    ProtoSets:
      - dropshipbe.pb
    Mappings:
      - Method: get
        Path: /api/v1/ping
        RpcPath: dropshipbe.Dropshipbe/Ping
      - Method: get
        Path: /api/v1/products
        RpcPath: dropshipbe.Dropshipbe/GetProducts
      - Method: get
        Path: /api/v1/banners
        RpcPath: dropshipbe.Dropshipbe/GetBannerItems
      - Method: get
        Path: /api/v1/blogs/:slug
        RpcPath: dropshipbe.Dropshipbe/GetBlogBySlug
      - Method: get
        Path: /api/v1/blogs
        RpcPath: dropshipbe.Dropshipbe/GetBlogItems
      - Method: get
        Path: /api/v1/categories
        RpcPath: dropshipbe.Dropshipbe/GetCategoryItems
      - Method: get
        Path: /api/v1/featured-products
        RpcPath: dropshipbe.Dropshipbe/GetFeaturedProducts
      - Method: get
        Path: /api/v1/new-products
        RpcPath: dropshipbe.Dropshipbe/GetNewProducts
      - Method: get
        Path: /api/v1/products/:slug
        RpcPath: dropshipbe.Dropshipbe/GetProductBySlug
      - Method: get
        Path: /api/v1/products/:id/faqs
        RpcPath: dropshipbe.Dropshipbe/GetProductFaqs
      - Method: get
        Path: /api/v1/products/:id/reviews
        RpcPath: dropshipbe.Dropshipbe/GetProductReviews
      - Method: get
        Path: /api/v1/categories/:category/products
        RpcPath: dropshipbe.Dropshipbe/GetProductsByCategory   
      - Method: get
        Path: /api/v1/related-products
        RpcPath: dropshipbe.Dropshipbe/GetRelatedProducts
      - Method: get
        Path: /api/v1/shop
        RpcPath: dropshipbe.Dropshipbe/GetShop
      - Method: get
        Path: /api/v1/slider-items
        RpcPath: dropshipbe.Dropshipbe/GetSliderItems
      - Method: get
        Path: /api/v1/social-product-videos
        RpcPath: dropshipbe.Dropshipbe/GetSocialProductVideos
      - Method: get
        Path: /api/v1/video-banner
        RpcPath: dropshipbe.Dropshipbe/GetVideoBanner
      - Method: post
        Path: /api/v1/products/reviews
        RpcPath: dropshipbe.Dropshipbe/CreateProductReview             
                           
