Name: dropship-gateway
Host: 0.0.0.0
Port: 8888

Upstreams:
  - Grpc:
      Target: 127.0.0.1:8080
    ProtoSets:
      - dropshipbe.pb
    Mappings:
      - Method: get
        Path: /api/v1/ping
        RpcPath: dropshipbe.Dropshipbe/Ping
      - Method: get
        Path: /api/v1/products
        RpcPath: dropshipbe.Dropshipbe/GetProducts